<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Assistant</title>
    <meta name="description" content="A smart, dynamic AI assistant web application.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Smart Assistant</h1>
            <p>Your intelligent AI companion</p>
        </header>
        
        <main class="chat-container" id="chat-container">
            <!-- Chat messages will appear here -->
            <div class="message system">
                <div class="message-content">Hello! I am your smart assistant. How can I help you today?</div>
            </div>
        </main>
        
        <footer class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
            <button id="send-btn" aria-label="Send message">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor"/>
                </svg>
            </button>
        </footer>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
